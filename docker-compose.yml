version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
    depends_on:
      - security_app
    networks:
      - security_net

  security_app:
    image: django-security-app
    container_name: security_processor
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=security_db
      - DB_USER=admin
      - DB_PASSWORD=securepass
      - DB_HOST=postgres_db
    depends_on:
      - postgres_db
    networks:
      - security_net

  postgres_db:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_DB: security_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - security_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_interface
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - security_net

volumes:
  pgdata:

networks:
  security_net:
    driver: bridge